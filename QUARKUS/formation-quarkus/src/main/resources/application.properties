# Configuration JPA
quarkus.datasource.jdbc.url = jdbc:mysql://localhost:3306/spring_boot
quarkus.datasource.username = root
quarkus.datasource.password = root

quarkus.hibernate-orm.database.generation = update
quarkus.hibernate-orm.log.sql = true

# - Configuration sécurité -

# Configuration user embarqués en mémoire
quarkus.security.users.embedded.enabled = true
quarkus.security.users.embedded.plain-text = true

quarkus.security.users.embedded.users.admin = 123456$
quarkus.security.users.embedded.roles.admin = admin

# Configuration accès
quarkus.http.auth.permission.api.paths = /*
quarkus.http.auth.permission.api.policy = authenticated
