<!--
champs texte (input) => text, password, date, time, email, url, number, tel* (affiche le clavier numerique sur un mobile), hidden

Zone de texte : textarea

Liste deroulante (select / option)

Choix : unique (0,1) radio / multiple (0-*) checkbox


buttons => submit / reset / button

<input type="submit" value="Valider"> => Valider et envoyer un formulaire (ne marche que dans un formulaire)
<input type="reset"> => remet toutes les values d'origines dans le formulaire
<button>Valider</button> => Si on est dans un formulaire, fait office de submit, si en dehors d'un form, à coupler avec du JS
<input type="button"> => Uniquement à coupler avec du JS



Une requete vers un serveur :

[protocol]://[domaine]/pageCible  [methode]

[protocol]://[domaine]/pageCible?param1=value1&param2=value2&param3=value3... [methode]

protocol => http / https

https://www.google.fr?query=votreRecherche  [GET]
http://localhost:8080/monProjet/ficheStagiaire?id=1 [GET]
http://localhost:8080/monProjet/stagiaire [POST]

Attributs de la balise form :

action => page vers laquelle sont sent les données du formulaire
method =>
GET (par defaut) => Les parametres sont envoyés dans l'url (via un a href ou un form)
POST (Uniquement via un formulaire) => Les parametres sont envoyés directement au serveur
PUT / PATCH / DELETE
enctype =>
  par defaut : application/x-www-form-urlencoded
  Si on veut envoyer des fichiers + autre chose => multipart/form-data

-->
