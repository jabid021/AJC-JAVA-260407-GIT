    <style>
      body {
        background: #111;
        color: white;
        font-family: Arial, sans-serif;
      }

      h1 {
        font-family: "Pokemon Solid", sans-serif;
        font-size: 90px;
        color: #ffcb05;
        text-shadow:
          -5px -5px 0 #2a75bb,
          5px -5px 0 #2a75bb,
          -5px 5px 0 #2a75bb,
          5px 5px 0 #2a75bb,
          0px 8px 0 #1a4f8b;
        margin-bottom: 10px;
        text-align: center;
        position: sticky;
        top: 20px;
      }

      .tier {
        display: flex;
        align-items: center;
        border-bottom: 2px solid #333;
        padding: 10px;
      }

      .label {
        width: 180px;
        font-weight: bold;
        text-align: center;
        padding: 10px;
        border-radius: 8px;
        margin-right: 10px;
        height: 100%;
      }

      .mons {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .mons img {
        width: 100px;
        height: 100px;
        image-rendering: pixelated;
      }
      .mons img:hover {
        scale: 1.2;
      }

      .bigger {
        scale: 10;
      }

      .god {
        background: #ff4d4d;
      }
      .what {
        background: #ff9966;
      }
      .cursed {
        background: #ffcc66;
      }
      .lacecho {
        background: #ffee66;
      }
      .sinj {
        background: #66ff99;
      }
      .cringe {
        background: #66ff66;
      }
      .bulots {
        background: #66ccff;
      }
      .pabo {
        background: #6699ff;
      }
      .poke {
        background: #9966ff;
      }

      .modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        justify-content: center;
        align-items: center;
      }

      .modal-content {
        background: linear-gradient(135deg, #fff, #ffe680);
        padding: 30px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 0 30px gold;
        position: relative;
        animation: pop 0.3s ease;
      }

      @keyframes pop {
        from {
          transform: scale(0.5);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }

      .close {
        position: absolute;
        top: 10px;
        right: 15px;
        cursor: pointer;
        font-size: 22px;
      }
      .confetti {
        position: fixed;
        width: 8px;
        height: 8px;
        background: red;
        top: -10px;
        animation: fall 2s linear forwards;
      }

      @keyframes fall {
        to {
          transform: translateY(100vh) rotate(360deg);
          opacity: 0;
        }
      }
    </style>
  </head>

    <script>
      let confetti = false;

      function onImageClick(img) {
        openPopup(img.id == "god");
      }

      document.querySelectorAll("img").forEach((img) => {
        img.addEventListener("click", () => onImageClick(img));
      });

      function openPopup(god) {
        document.getElementById("modal").style.display = "flex";

        if (god) {
          innerHtml = `<img
          src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/779.png" class="bigger"
        />`;

          const sound = document.getElementById("sound");
          sound.currentTime = 0;
          sound.play();
          confetti = true;
          for (let i = 0; i < 40; i++) {
            createConfetti();
          }
        } else {
          console.log(Math.floor(Math.random()) * 5 + 1);
          innerHtml = `<img
          src="assets/gifs/random${Math.floor(Math.random() * 5) + 1}.gif""
        />`;
        }
        document.getElementById("modal-content").innerHTML = innerHtml;
      }

      function closePopup() {
        document.getElementById("modal").style.display = "none";
        const sound = document.getElementById("sound");
        sound.pause();
        confetti = false;
      }

      function createConfetti() {
        if (!confetti) {
          return;
        }

        const c = document.createElement("div");
        c.classList.add("confetti");
        document.body.appendChild(c);

        c.style.left = Math.random() * window.innerWidth + "px";
        c.style.background = `hsl(${Math.random() * 360}, 100%, 60%)`;
        c.style.animationDuration = 1 + Math.random() * 2 + "s";

        setTimeout(() => c.remove(), 3000);
        setTimeout(() => createConfetti(), Math.random() * 1000);
      }

      document.getElementById("modal").addEventListener("click", function (e) {
        if (e.target === this) {
          closePopup();
        }
      });
    </script>
