<link
  href="https://fonts.googleapis.com/css2?family=VT323&display=swap"
  rel="stylesheet"
/>

<style>
  body {
    background-image: url("assets/img/water.png");
    background-size: 100% 100%;
    display: flex;
    justify-content: center;
    align-items: center;
  }
#qwack {
    position: absolute;
    top: 10%;
    color: rgb(255, 238, 2);
    font-family: "VT323", monospace;
    font-size: 50px;
  }
  #imgDuck {
    position: absolute;
    left: 25%;
    top: 40%;
    transform: translateX(-50%);
    width: 180px;
  }

  #imgDog {
    position: absolute;
    left: 75%;
    top: 40%;
    transform: translateX(-50%);
    width: 180px;
  }

  #formStart {
    width: 20%;
    height: 10vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  #formStart div {
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    font-family: "VT323", monospace;
    font-size: 20px;
    margin-bottom: 10px;
  }

  label {
    width: 70%;
  }

input,
select {
  background-color: #fcf157;
  padding: 5px;
  border-radius: 5px;
  width: 30%;
  color: black;
  border: 2px solid white;
}

select option {
  color: black;
  background-color: white;
}

  .div-start {
    margin-top: 10px;
  }

  #btnStart {
    width: 50%;
    cursor: pointer;
  }

  #btnStart:disabled {
    display: none;
  }

  #grass {
    display: none;
    position: relative;
    width: 700px;
    height: 700px;
    background-image: url("assets/img/Grass.png");
  }

  #pikachu {
    position: absolute;
    top: 30;
    left: 330;
  }

  #nomPerso {
    position: absolute;
    bottom: 100%;
    left: 50%;
    color: white;
    transform: translateX(-50%);
    margin-bottom: 4px;
    padding: 2px 6px;
    border-radius: 6px;
    font-size: 14px;
    white-space: nowrap;
  }

  #centrePokemon {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  #imgCentrePokemon {
    width: 200px;
  }

  .crotte {
    position: absolute;
    width: 20px;
    height: 20px;
  }

  .div-crottes {
    display: none;
    margin-left: 30px;
    color: white;
  }

  .compteurCrotte {
    display: flex;
    align-items: center;
    justify-content: center;
  }
</style>

<script defer src="pikachu.js" charset="utf-8"></script>
<audio id="theme" src="assets/audio/pixeland.mp3"></audio>
<div id="qwack"><h1>QWACK BALADE</h1></div>
<div id="imgAnimaux">
  <img id="imgDuck" src="assets/img/duck.gif" alt="" width="60px" />
  <img id="imgDog" src="assets/img/dog.gif" alt="" width="60px" />
</div>
<div id="formStart">
  <div class="div-name">
    <label for="inputName">Accompagnant</label>
    <input id="inputName" type="text" placeholder="Yohann" name="inputName" />
  </div>
  <div class="div-sex">
    <label for="select_sex">De quel sexe est l'accompagnant ?</label>
    <select id="select_sex">
      <option selected value="male">Homme</option>
      <option value="female">Femme</option>
    </select>
  </div>
  <div class="div-animal">
    <label for="">Choisir un animal à balader</label>
    <select id="select_animal">
      <option selected value="duck">Canard</option>
      <option value="dog">Chien</option>
    </select>
  </div>

  <div class="div-start">
    <input id="btnStart" disabled type="button" value="Partir en balade !" />
  </div>
</div>

<div id="grass">
  <div id="pikachu">
    <div id="nomPerso"></div>
    <img id="imgPikachu" src="assets/img/pikachuDown.png" width="60px" />
  </div>
  <div id="centrePokemon">
    <img id="imgCentrePokemon" src="assets/img/centrePokemon.png" alt="" />
  </div>
</div>

<div class="div-crottes">
  <div id="crotte">
    <img
      id="imgCrotte"
      src="assets/img/caca.png"
      alt=""
      width="30px"
      height="30px"
    />
  </div>
  <div class="compteurCrotte">
    <b id="compteurCrotte">0/5</b>
  </div>
</div>
