<style>
  body {
    background-image: url("assets/img/water.png");
    background-size: 100% 100%;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  #formStart {
    width: 20%;
    height: 10vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  #formStart div {

    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
  }

  label {
    width: 70%;

  }

  input,
  select {
    background: none;
    padding: 5px;
    border-radius: 5px;
    width: 30%;
    color: white;
  }

  select option {
    color: black;
  }

  .div-start {
    margin-top: 10px;
  }

  #btnStart {
    width: 50%;
    cursor: pointer;
  }

  #btnStart:disabled {
    display: none;
  }

  #grass {
    display: none;
    position: relative;
    width: 700px;
    height: 700px;
    background-image: url("assets/img/Grass.png")
  }

  #pikachu {
    position: absolute;
    top: 30;
    left: 330;

  }

  #centrePokemon {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  #imgCentrePokemon {
    width: 200px;
  }

  .crotte {
    position: absolute;
    width: 20px;
    height: 20px;
  }

  .div-crottes {
    margin-left: 30px;
    color: white;
  }

  .compteurCrotte {
    display: flex;
    align-items: center;
    justify-content: center;
  }
</style>


<script defer src="pikachu.js" charset="utf-8"></script>
<audio id="themePokemon" src="assets/audio/theme.mp3"></audio>
<div id="formStart">
  <div class="div-name">
    <label for="inputName">Accompagnant</label>
    <input id="inputName" type="text" placeholder="pikachu" name="inputName">
  </div>
  <div class="div-animal">
    <label for="">Choisir un animal à balader</label>
    <select id="select_animal">
      <option selected value="duck">Duck</option>
      <option value="dog">Dog</option>
    </select>
  </div>

  <div class="div-start">
    <input id="btnStart" disabled type="button" value="Partir en balade !">
  </div>

</div>

<div id="grass">
  <div id="pikachu"><img id="imgPikachu" src="assets/img/pikachuDown.png" width="60px"></div>
  <div id="centrePokemon"><img id="imgCentrePokemon" src="assets/img/centrePokemon.png" alt=""></div>
</div>

<div class="div-crottes">
  <div id="crotte"><img id="imgCrotte" src="assets/img/caca.png" alt="" width="30px" height="30px"></div>
  <div class="compteurCrotte">
    <b id="compteurCrotte">0/5</b>
  </div>
</div>
