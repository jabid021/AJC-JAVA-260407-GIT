name: bibliotek-compose

services:
  mysql:
    image: mysql:8.0.45
    container_name: bibliotek-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root

    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 3s
      retries: 10
      interval: 5s

    volumes:
      - db_data:/var/lib/mysql
      - ./bibliotek-init.sql:/docker-entrypoint-initdb.d/setup.sql

    networks:
      - bibliotek

  boot:
    build:
      context: bibliotek-boot
    container_name: bibliotek-boot

    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql/bibiotek
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root

    depends_on:
      mysql:
        condition: service_healthy

    networks:
      - bibliotek

  angular:
    build:
      context: bibliotek-angular
    container_name: bibliotek-angular

    ports:
      - 80:80

    depends_on:
      - boot

    networks:
      - bibliotek

volumes:
  db_data:
    name: bibliotek-db-data

networks:
  bibliotek:
    name: bibliotek
